<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='new_gc.css') }}">
</head>
<body>
    <div id="back" style="border: 2px solid white; padding: 1%;position: fixed; top: 0; right: 0; width: 100%; height: 15%;">
        <h1><a href="/">Back</a></h1>
    </div>
    <h1>Create a new GC</h1>
    <form action="/new-gc" method="POST">
        <input type="text" name="gc-name" placeholder="GC NAME">
        <button id="submit">Submit</button>
    </form>
    {% if error %}
      <p style="color: red; font-weight: bold; font-size: x-large;">{{ error }}</p>
    {% endif %}
</body>
</html>
