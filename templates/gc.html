<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../static/gc.css">
</head>
<body>
    <div id="messages-box">
        {% for message in messages %}
            {% if message["sender_id"]|string == user_id|string %}
                <div class="messages user-messages" data-sender="{{ message['sender_name'] }}" data-id="{{ message['_id']|string }}">{{ message["text"] }}</div>
            {% else %}
                <div class="messages other-messages" data-sender="{{ message['sender_name'] }}" data-id="{{ message['_id']|string }}">{{ message["text"] }}</div>
            {% endif %}
        {% endfor %}
    </div>
    <div id="input-wrapper">
        <form id="input-form" action="/send-message" method='POST'>
            {% if owner_id|string == user_id|string %}
                <a href="/edit-gc" id="admin">*</a>
            {% endif %}
            <div id="input-container">
                <input type="text" placeholder="Type your message here!" name="message">
            </div>
            <button id="submit">&uarr;</button>
        </form>
    </div>
        <script>
            let msgBox = document.getElementById("messages-box");
            let inputElem = document.getElementsByTagName("input")[0];
            let formElem = document.getElementById("input-form");
            let submitBtn = document.getElementsByTagName("button")[0];
            let infoMode = false;
            let hoverLock = false;
            let messageElems = document.querySelectorAll(".messages");
            inputElem.oninput = function(event) {
            if (inputElem.value === "back") {
                document.getElementsByTagName("button")[0].classList.add("rotate");
            }
            else if (inputElem.value === "join call") {
                document.getElementsByTagName("button")[0].innerHTML = "📞";
            }
            else if (inputElem.value === "info mode") {
                infoMode = true;
            }
            else {
                document.getElementsByTagName("button")[0].classList.remove("rotate");
                document.getElementsByTagName("button")[0].innerHTML = "&uarr;";
                if (!hoverLock) {
                    infoMode = false;
                }
            }
            };
            formElem.onsubmit = function(event) {
                if (submitBtn.classList.contains("rotate")) {
                    event.preventDefault(); 
                    window.location.href = "/dashboard";
                }
                else if (submitBtn.textContent === "📞") {
                    event.preventDefault();
                    window.location.href = "/chat/{{ gc_name }}/call";
                }
                else if (submitBtn.textContent === "🗑") {
                    event.preventDefault();
                    if (activeDeleteId) {
                        let deleteForm = document.createElement("form");
                        deleteForm.method = "POST";
                        deleteForm.action = "/delete-message/" + activeDeleteId;
                        document.body.appendChild(deleteForm);
                        deleteForm.submit();
                    }
                }
                else {
                    console.log("Sending message...");
                }
            };
            messageElems.forEach(elem => {
                elem.addEventListener("mouseenter", function(event) {
                    if (infoMode) {
                        clearTimeout(resetTimeout);
                        let name = event.target.dataset.sender;
                        activeDeleteId = event.target.dataset.id;
                        inputElem.value = "Sent by: " + name;
                        {% if owner_id|string == user_id|string %}
                            submitBtn.textContent = "🗑";
                        {% endif %}
                    }
                });
                elem.addEventListener("mouseleave", function(event) {
                    if (infoMode) {
                        resetTimeout = setTimeout(function() {
                            inputElem.value = "info mode";
                            submitBtn.innerHTML = "&uarr;";
                            activeDeleteId = null;
                        }, 5000);
                    }
                });
            });

            submitBtn.addEventListener("mouseenter", function() {
                if (infoMode && activeDeleteId) {
                    clearTimeout(resetTimeout);
                }
            });
            submitBtn.addEventListener("mouseleave", function(event) {
                if (infoMode) {
                    inputElem.value = "info mode";
                    submitBtn.innerHTML = "&uarr;";
                    activeDeleteId = null;
                }
            });
    </script>
</body>
</html>
