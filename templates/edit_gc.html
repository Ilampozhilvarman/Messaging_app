<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
        }

        body {
            background: black;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #box {
            border: 2px solid white;
            width: 70%;
            height: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            margin: 2%;
            gap: 2%;
            width: 100%;
        }

        label {
            font-size: x-large;
        }

        button {
            background-color: black;
            color: white;
            cursor: pointer;
        }

        .finish {
            width: 30vw;
            height: 10vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .finish h1 {
            font-size: 3rem;
        }

        @keyframes shift-rainbow {
            0% {
                background-position: 0% center;
            }
            100% {
                background-position: 200% center;
            }
        }
    </style>
</head>
<body>
    <h1>Editing Group: {{ gc.chat_name }}</h1>
    <div id="box">
        <form action="/add-user" class="row" method="POST">
            <label for="add-user">Add user: </label>
            <input type="text" name="add-user" id="add-user" placeholder="Username">
            <button id="submit">Add</button>
        </form>
        <form action="/del-user" class="row" method="POST">
            <label for="remove-user">Remove user: </label>
            <input type="text" name="remove-user" id="remove-user" placeholder="Username">
            <button id="submit">Delete</button>
        </form>
        <form action="/delete-gc" class="row" method="POST">
            <button id="submit">Delete GC</button>
        </form>
        <form action="/finish-changes">
            <button id="submit" class="finish"><h1>Finish changes</h1></button>
        </form>
    </div>
    {% if error %}
      <p style="color: red; font-weight: bold; font-size: x-large;">{{ error }}</p>
    {% endif %}
</body>
</html>
