<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Call - {{ gc_name }}</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding-top: 50px; }
        .container { max-width: 400px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .status { font-size: 1.2rem; color: #4CAF50; margin: 20px 0; }
        .btn-hangup { background: #ff3333; color: white; border: none; padding: 12px 30px; font-size: 1rem; border-radius: 25px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-hangup:hover { background: #cc0000; }
    </style>
</head>
<body stlye="display: flex; align-items: center; justify-content: center;">
<div class="container">
    <h2>Calling in: {{ gc_name }}</h2>
    <div id="status-text" class="status">Connecting to audio channels...</div>
    <a href="/chat/{{ gc_name }}" class="btn-hangup" onclick="return leaveVoiceCall(event)">🛑 Leave Call</a>
</div>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
<script>
    let rtc = {
    localAudioTrack: null,
    client: null
    };
    const channel = new BroadcastChannel("my_app");
    let anotherTabExists = false;
    channel.postMessage("are_you_open");
    channel.onmessage = (event) => {
        if (event.data === "yes") {
            anotherTabExists = true;
            document.body.innerHTML = "<h1>Another tab is already open.</h1>";
        }
        if (event.data === "are_you_open") {
            channel.postMessage("yes");
        }
    };
    async function initCall() {
    try {
        let response = await fetch('/get-token');
        if (!response.ok) throw new Error("Could not authorize connection.");
        let data = await response.json();
        rtc.client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        rtc.client.on("user-published", async (user, mediaType) => {
            await rtc.client.subscribe(user, mediaType);
            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });
        rtc.client.on("user-unpublished", (user) => {
            console.log("User unpublished audio");
        });
        rtc.client.on("user-left", (user) => {
            console.log("User left");
        });
        await rtc.client.join(
            data.appId,
            data.channel,
            data.token,
            data.uid
        );
        rtc.localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        await rtc.client.publish([rtc.localAudioTrack]);
        document.getElementById("status-text").innerText = "🎙️ Call Connected & Active";
    } catch (err) {
        console.error(err);
        document.getElementById("status-text").innerText = "❌ Connection failed. Check microphone permissions.";
        document.getElementById("status-text").style.color = "#ff3333";
    }
    }
    window.addEventListener("beforeunload", () => {
    if (rtc.localAudioTrack) {
        rtc.localAudioTrack.stop();
        rtc.localAudioTrack.close();
    }
    });
    async function leaveVoiceCall(event) {
    if (event) event.preventDefault();
    if (rtc.localAudioTrack) {
        rtc.localAudioTrack.stop();
        rtc.localAudioTrack.close();
    }
    if (rtc.client) {
        await rtc.client.leave();
    }
    window.location.href = "/chat/{{ gc_name }}";
    }

    window.onload = initCall;
</script>

</body>
</html>
